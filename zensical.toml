[project]
site_name = "mouse-core"
site_description = "Meta-Optimization Using Sequential Experiences — core ICRL library"
site_url = "https://micahr234.github.io/mouse-core/"
repo_url = "https://github.com/micahr234/mouse-core"
repo_name = "micahr234/mouse-core"
docs_dir = "docs"

nav = [
  {"Home" = "index.md"},
  {"Guides" = [
    {"Model Architecture" = "architecture.md"},
    {"Data pipeline"  = "data.md"},
    {"Losses"         = "losses.md"},
    {"Examples"       = "examples.md"},
  ]},
  {"API Reference" = [
    {"Models" = [
      {"Base"      = "api/model.md"},
      {"Backbone"  = "api/backbone.md"},
      {"Embedding" = "api/embedding.md"},
      {"Heads"     = "api/heads.md"},
    ]},
    {"Losses" = "api/losses.md"},
    {"Data"   = "api/data.md"},
  ]},
]

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
]

# ── Markdown extensions ───────────────────────────────────────────────────────

[project.markdown_extensions.admonition]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.superfences"]

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

# ── mkdocstrings ──────────────────────────────────────────────────────────────

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style          = "google"
show_source              = true
show_root_heading        = true
show_symbol_type_heading = true
show_symbol_type_toc     = true
members_order            = "source"
separate_signature       = true
show_signature_annotations = true
merge_init_into_class    = true
inherited_members        = false
