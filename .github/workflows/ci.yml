name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # TEMPORARY: keep GIL off while transformers pins tokenizers<=0.23.0
      # (those wheels re-enable the GIL). Remove once transformers allows
      # tokenizers>=0.23.1 — see CONTRIBUTING.md.
      PYTHON_GIL: "0"
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install free-threaded Python and package
        run: |
          uv python install 3.14t
          uv venv --python 3.14t
          uv pip install -e ".[dev]" --python .venv/bin/python

      - name: Type check
        run: .venv/bin/pyright src/ tests/

      - name: Run tests
        run: .venv/bin/pytest -q
